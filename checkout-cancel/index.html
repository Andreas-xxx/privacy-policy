<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Betalning avbruten – Scotify</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1c1f2b;
      border-radius: 20px;
      padding: 48px 36px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; color: #ffffff; }
    p { font-size: 16px; color: #9ca3af; line-height: 1.6; margin-bottom: 32px; }
    .btn {
      display: inline-block;
      background: #4f46e5;
      color: #fff;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn:hover { background: #4338ca; }
    .note { font-size: 13px; color: #6b7280; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">↩️</div>
    <h1>Betalning avbruten</h1>
    <p>
      Ingen betalning genomfördes.<br />
      Gå tillbaka till Scotify-appen och försök igen när du är redo.
    </p>
    <a href="#" onclick="window.close(); return false;" class="btn">Stäng denna sida</a>
    <p class="note">Du kan stänga webbläsarfliken och återgå till appen.</p>
  </div>
</body>
</html>
